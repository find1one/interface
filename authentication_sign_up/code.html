<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Skybound - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#204b63",
                        "secondary-fixed": "#c6e7ff",
                        "inverse-surface": "#313030",
                        "surface-dim": "#dcd9d9",
                        "secondary-fixed-dim": "#a3cce8",
                        "on-surface": "#1c1b1b",
                        "primary-fixed-dim": "#82cfff",
                        "on-background": "#1c1b1b",
                        "inverse-primary": "#82cfff",
                        "surface-variant": "#e5e2e1",
                        "on-surface-variant": "#3e4850",
                        "background": "#fcf9f8",
                        "on-primary-fixed": "#001e2d",
                        "surface": "#fcf9f8",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-bright": "#fcf9f8",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e5e2e1",
                        "on-secondary": "#ffffff",
                        "tertiary": "#8d4f00",
                        "on-primary-fixed-variant": "#004c6b",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#c6e7ff",
                        "primary-container": "#00aeef",
                        "tertiary-container": "#ea8c21",
                        "on-secondary-fixed": "#001e2d",
                        "surface-container": "#f0edec",
                        "inverse-on-surface": "#f3f0ef",
                        "outline-variant": "#bdc8d1",
                        "on-tertiary": "#ffffff",
                        "surface-container-low": "#f6f3f2",
                        "secondary": "#3a637c",
                        "primary": "#00658d",
                        "outline": "#6e7881",
                        "on-tertiary-container": "#572f00",
                        "on-secondary-container": "#3d657e",
                        "on-primary-container": "#003e58",
                        "tertiary-fixed-dim": "#ffb876",
                        "on-tertiary-fixed": "#2d1600",
                        "on-tertiary-fixed-variant": "#6b3b00",
                        "tertiary-fixed": "#ffdcc0",
                        "secondary-container": "#b9e2ff",
                        "surface-container-high": "#ebe7e7",
                        "surface-tint": "#00658d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "lg": "16px",
                        "container-margin": "16px",
                        "xl": "24px",
                        "sm": "8px",
                        "xs": "4px",
                        "unit": "4px",
                        "md": "12px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "numeric-data": ["Plus Jakarta Sans"],
                        "title-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "label-caps": ["Plus Jakarta Sans"],
                        "display-lg": ["Plus Jakarta Sans"],
                        "body-sm": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "numeric-data": ["16px", { "lineHeight": "1", "fontWeight": "500" }],
                        "title-sm": ["18px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "label-caps": ["11px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "700" }],
                        "display-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-sm": ["13px", { "lineHeight": "1.4", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        /* Hide scrollbar for clean mobile preview */
        ::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md text-body-md h-screen w-full flex justify-center items-center overflow-hidden">
<!-- Mobile Device Container for Preview Constraints -->
<div class="w-full h-full max-w-[390px] max-h-[844px] bg-surface flex flex-col relative sm:border sm:border-outline-variant shadow-sm overflow-y-auto">
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-gutter py-xl">
<!-- Header -->
<header class="flex flex-col items-center text-center mb-xl">
<div class="w-12 h-12 bg-surface-container flex items-center justify-center rounded-lg border border-outline-variant mb-md shadow-sm">
<span class="material-symbols-outlined text-primary-container" data-icon="flight_takeoff" style="font-variation-settings: 'FILL' 1;">flight_takeoff</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface mb-xs">Skybound</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant max-w-[240px]">Your gateway to seamless travel planning.</p>
</header>
<!-- Segmented Control -->
<div class="flex w-full bg-surface-container-low border border-outline-variant p-xs rounded-lg mb-lg">
<button class="flex-1 py-[6px] text-center font-label-caps text-label-caps text-on-surface-variant rounded uppercase tracking-wider transition-colors" type="button">Sign In</button>
<button class="flex-1 py-[6px] text-center font-label-caps text-label-caps bg-on-surface text-surface shadow-sm rounded uppercase tracking-wider transition-colors" type="button">Sign Up</button>
</div>
<!-- Form -->
<form action="#" class="flex flex-col flex-1" method="POST">
<div class="flex flex-col gap-md mb-lg">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="fullName">Full Name</label>
<input class="h-11 px-md border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-2 focus:border-primary-container focus:p-[11px] transition-all" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="email">Email Address</label>
<input class="h-11 px-md border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-2 focus:border-primary-container focus:p-[11px] transition-all" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface uppercase flex justify-between" for="password">
<span>Password</span>
</label>
<div class="relative">
<input class="w-full h-11 px-md border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-2 focus:border-primary-container focus:p-[11px] transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Password Strength Indicator -->
<div class="flex items-center gap-sm mt-1">
<div class="flex flex-1 gap-1 h-1">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-surface-container-highest rounded-full"></div>
</div>
<span class="font-label-caps text-[9px] uppercase tracking-wider text-primary">Strong</span>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-xs mt-sm">
<label class="font-label-caps text-label-caps text-on-surface uppercase" for="confirmPassword">Confirm Password</label>
<input class="h-11 px-md border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-2 focus:border-primary-container focus:p-[11px] transition-all" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-sm mb-lg px-xs">
<div class="relative flex items-center justify-center mt-0.5">
<input class="appearance-none w-4 h-4 border border-outline-variant rounded bg-surface-container-lowest checked:bg-primary-container checked:border-primary-container transition-colors cursor-pointer peer" id="terms" name="terms" required="" type="checkbox"/>
<span class="material-symbols-outlined text-on-primary text-[14px] absolute pointer-events-none opacity-0 peer-checked:opacity-100" data-icon="check" data-weight="fill">check</span>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant leading-tight cursor-pointer" for="terms">
                        I agree to the <a class="text-on-surface underline font-medium hover:text-primary-container transition-colors" href="#">Terms of Service</a> and <a class="text-on-surface underline font-medium hover:text-primary-container transition-colors" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Main Action -->
<button class="w-full h-12 bg-primary-container text-on-primary font-label-caps text-label-caps uppercase rounded-lg flex items-center justify-center shadow-sm active:opacity-90 active:scale-[0.98] transition-all mb-xl" type="submit">
                    Create Account
                </button>
<!-- Social Divider -->
<div class="flex items-center gap-md mb-md">
<div class="flex-1 h-px bg-outline-variant/60"></div>
<span class="font-body-sm text-body-sm text-on-surface-variant">Or sign up with</span>
<div class="flex-1 h-px bg-outline-variant/60"></div>
</div>
<!-- Social Buttons -->
<div class="flex gap-md mb-xl">
<button class="flex-1 h-11 border border-outline-variant rounded-lg flex items-center justify-center gap-sm bg-surface-container-lowest hover:bg-surface-container transition-colors active:bg-surface-variant" type="button">
<span class="font-label-caps text-label-caps text-on-surface uppercase">Google</span>
</button>
<button class="flex-1 h-11 border border-outline-variant rounded-lg flex items-center justify-center gap-sm bg-surface-container-lowest hover:bg-surface-container transition-colors active:bg-surface-variant" type="button">
<span class="font-label-caps text-label-caps text-on-surface uppercase">Apple</span>
</button>
</div>
</form>
<!-- Footer Link -->
<p class="text-center font-body-sm text-body-sm text-on-surface-variant mt-auto mb-lg">
                Already have an account? <a class="text-primary font-medium hover:underline" href="#">Sign In</a>
</p>
<!-- Trust Badges -->
<div class="flex justify-center items-center gap-lg pt-md border-t border-outline-variant/40">
<div class="flex items-center gap-xs text-outline">
<span class="material-symbols-outlined text-[16px]" data-icon="lock">lock</span>
<span class="font-label-caps text-[10px] uppercase tracking-wider">Secure Booking</span>
</div>
<div class="flex items-center gap-xs text-outline">
<span class="material-symbols-outlined text-[16px]" data-icon="language">language</span>
<span class="font-label-caps text-[10px] uppercase tracking-wider">Global Support</span>
</div>
</div>
</main>
</div>
</body></html>
