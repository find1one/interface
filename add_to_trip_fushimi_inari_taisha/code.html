<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Add to Trip - VoyagePro</title>

                        "error": "#ba1a1a",
                        "secondary": "#3a637c",

<style>
        body {
            width: 390px;
            height: 844px;
            margin: 0 auto;
            position: relative;
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            border: 1px solid theme('colors.outline-variant'); /* To visualize viewport boundaries */
        }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col h-full bg-background relative overflow-y-auto no-scrollbar pb-[80px]">
<!-- Top App Bar (Custom for this sub-page context, no global nav shell) -->
<header class="sticky top-0 w-full z-50 bg-surface border-b border-outline-variant flex items-center justify-between px-container-margin h-14">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center -ml-2 text-primary hover:bg-surface-container-high rounded-full active:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-title-sm" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-title-sm text-title-sm text-on-surface flex-1 text-center font-bold tracking-tight">Add to Trip</h1>
<div class="w-10 h-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-margin py-lg flex flex-col gap-xl">
<!-- Place Summary Card -->
<section class="bg-surface-container-lowest border border-outline-variant rounded-card p-md flex gap-md">
<div class="w-20 h-20 rounded-sm bg-surface-container overflow-hidden shrink-0">
<img alt="Fushimi Inari-taisha" class="w-full h-full object-cover" data-alt="A striking, high-quality, professional photograph of the vibrant orange torii gates at Fushimi Inari-taisha in Kyoto. The scene is brightly lit with a light-mode aesthetic, emphasizing clean lines and rich, contrasting colors against a subtle, well-exposed background. The mood is serene and architectural, suitable for a high-end travel utility app." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk8K8w3oEz8nH2CG2trit6CKIw3x_hLw8HKKnMGDGR2TuqAh1IMKTUDM_tu-j29qH0pWIcv_21cx4-7T-LyEtdV4sYawqvTbM6_ZPQ8d-8HQ1NikTjtG1G_sKbXdwmhI21Ga0Uh6Uzg4yj3zmpqE9O_8yjZheX84IJT7ZerPcP3wHvFPamT8_0442orDfjlIigUOhl26sS3jZOa2JaN5Nt08tR8bdLBARyTu75LE4-lfZIQc7P99A2LM2UgIE9Y7MHVAvaj4XOt9E"/>
</div>
<div class="flex flex-col justify-between py-xs">
<div>
<h2 class="font-title-sm text-title-sm text-on-surface leading-tight">Fushimi Inari-taisha</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-unit truncate max-w-[200px]">68 Fukakusa Yabunouchicho, Kyoto</p>
</div>
<div class="flex items-center gap-gutter">
<div class="flex items-center text-primary-container">
<span class="material-symbols-outlined text-[14px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-numeric-data text-body-sm ml-unit text-on-surface font-medium">4.9</span>
</div>
<div class="h-4 w-px bg-outline-variant"></div>
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined text-[14px]" data-icon="schedule">schedule</span>
<span class="font-body-sm text-body-sm ml-unit">2-3 hours</span>
</div>
</div>
</div>
</section>
<!-- Target Trip Selection -->
<section class="flex flex-col gap-gutter">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Select Trip</h3>
<div class="flex gap-gutter overflow-x-auto no-scrollbar pb-xs">
<!-- Existing Trip (Unselected) -->
<button class="shrink-0 w-36 h-24 bg-surface-container-lowest border border-outline-variant rounded-card p-md flex flex-col justify-between items-start text-left active:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="flight_takeoff">flight_takeoff</span>
<span class="font-body-sm text-body-sm text-on-surface font-medium leading-tight line-clamp-2">Tokyo Spring Trip</span>
</button>
<!-- Existing Trip (Selected) -->
<button class="shrink-0 w-36 h-24 bg-surface-container-lowest border-2 border-primary-container rounded-card p-md flex flex-col justify-between items-start text-left relative overflow-hidden bg-secondary-container/10">
<div class="absolute top-2 right-2 bg-primary-container text-on-primary rounded-full w-5 h-5 flex items-center justify-center">
<span class="material-symbols-outlined text-[12px]" data-icon="check">check</span>
</div>
<span class="material-symbols-outlined text-primary-container" data-icon="luggage">luggage</span>
<span class="font-body-sm text-body-sm text-on-surface font-medium leading-tight line-clamp-2">Kyoto Weekend</span>
</button>
<!-- Create New Trip -->
<button class="shrink-0 w-36 h-24 bg-surface-container border border-dashed border-outline-variant rounded-card p-md flex flex-col justify-center items-center text-center active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mb-unit" data-icon="add">add</span>
<span class="font-body-sm text-body-sm text-on-surface-variant font-medium">Create New</span>
</button>
</div>
</section>
<!-- Date & Time Selection -->
<section class="flex flex-col gap-md">
<h3 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Schedule</h3>
<!-- Date Selector Row -->
<button class="w-full bg-surface-container-lowest border border-outline-variant rounded-input p-md flex items-center justify-between active:bg-surface-container-low transition-colors">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="calendar_month">calendar_month</span>
<span class="font-numeric-data text-body-md text-on-surface font-medium">Sat, Oct 14, 2023</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Time Slots -->
<div class="flex gap-gutter">
<!-- Selected Slot -->
<button class="flex-1 py-sm px-md bg-secondary-container/20 border border-primary-container rounded-input text-center">
<span class="font-body-sm text-body-sm text-on-surface font-medium">Morning</span>
</button>
<!-- Unselected Slots -->
<button class="flex-1 py-sm px-md bg-surface-container-lowest border border-outline-variant rounded-input text-center text-on-surface-variant active:bg-surface-container-low">
<span class="font-body-sm text-body-sm">Afternoon</span>
</button>
<button class="flex-1 py-sm px-md bg-surface-container-lowest border border-outline-variant rounded-input text-center text-on-surface-variant active:bg-surface-container-low">
<span class="font-body-sm text-body-sm">Evening</span>
</button>
</div>
</section>
<!-- Conflict / Logistics Module -->
<section class="bg-surface-container-lowest border border-outline-variant border-l-4 border-l-primary-container rounded-card p-md flex flex-col gap-xs">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary-container text-[18px]" data-icon="check_circle">check_circle</span>
<span class="font-body-sm text-body-sm font-medium text-on-surface">No schedule conflict</span>
</div>
<div class="flex items-center gap-sm mt-unit pl-xl text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="directions_transit">directions_transit</span>
<span class="font-body-sm text-body-sm">12 min from previous stop (Kiyomizu-dera)</span>
</div>
</section>
<!-- Notes Field -->
<section class="flex flex-col gap-unit pb-xl">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider ml-unit" for="trip-note">Notes (Optional)</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-input p-md font-body-sm text-body-sm text-on-surface placeholder:text-outline focus:border-primary-container focus:ring-0 resize-none" id="trip-note" placeholder="Add a note..." rows="3"></textarea>
</section>
</main>
<!-- Sticky Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-container-margin z-50">
<button class="w-full h-12 bg-primary-container text-on-primary font-title-sm text-body-md font-bold rounded-input flex items-center justify-center active:bg-primary-container/90 transition-colors shadow-sm">
            ADD TO ITINERARY
        </button>
</div>
</body></html>
