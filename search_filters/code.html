<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Scrollbar for chips container */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Custom Range Slider Styling (CSS-only approximation for utility focus) */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #00aeef;
            cursor: pointer;
            margin-top: -10px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e4e4e7;
            border-radius: 2px;
        }
        /* Simulating the filled track part - requires JS for true dual thumb, using single for visual layout here, but framing as a range */
        .range-track-active {
            position: absolute;
            height: 4px;
            background-color: #00aeef;
            top: 50%;
            transform: translateY(-50%);
            left: 20%;
            right: 30%;
            z-index: 10;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased overflow-hidden">
<!-- Dimmed Background Overlay -->
<div class="fixed inset-0 bg-on-surface/50 z-40"></div>
<!-- Full Page Modal Container -->
<div class="fixed inset-x-0 bottom-0 top-[10%] bg-surface-container-lowest rounded-t-xl z-50 flex flex-col shadow-[0px_2px_4px_rgba(0,0,0,0.05),_0px_1px_2px_rgba(0,0,0,0.05)]">
<!-- Header -->
<header class="flex items-center justify-between px-md h-[56px] border-b border-custom-border shrink-0 bg-surface-container-lowest rounded-t-xl">
<button aria-label="Close Filters" class="w-[44px] h-[44px] flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors rounded-full">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-title-sm text-title-sm text-on-surface">Filters</h1>
<button class="h-[44px] px-sm flex items-center justify-center font-label-caps text-label-caps text-primary hover:bg-surface-container transition-colors rounded">
                RESET
            </button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-md py-lg space-y-xl pb-[100px]">
<!-- Section 1: Destination Type -->
<section class="space-y-md">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Destination Type</h2>
<div class="flex overflow-x-auto no-scrollbar gap-sm pb-xs -mx-md px-md">
<button class="h-[44px] px-lg border border-custom-border rounded-full flex items-center justify-center font-body-md text-body-md text-on-surface whitespace-nowrap bg-surface-container-lowest hover:bg-surface-container transition-colors">
                        City
                    </button>
<button class="h-[44px] px-lg border border-primary bg-primary/10 rounded-full flex items-center justify-center font-body-md text-body-md text-primary whitespace-nowrap">
                        Beach
                    </button>
<button class="h-[44px] px-lg border border-custom-border rounded-full flex items-center justify-center font-body-md text-body-md text-on-surface whitespace-nowrap bg-surface-container-lowest hover:bg-surface-container transition-colors">
                        Mountain
                    </button>
<button class="h-[44px] px-lg border border-custom-border rounded-full flex items-center justify-center font-body-md text-body-md text-on-surface whitespace-nowrap bg-surface-container-lowest hover:bg-surface-container transition-colors">
                        Cultural
                    </button>
<button class="h-[44px] px-lg border border-custom-border rounded-full flex items-center justify-center font-body-md text-body-md text-on-surface whitespace-nowrap bg-surface-container-lowest hover:bg-surface-container transition-colors">
                        Nature
                    </button>
</div>
</section>
<!-- Divider -->
<div class="h-px bg-custom-border w-full"></div>
<!-- Section 2: Budget Range -->
<section class="space-y-md">
<div class="flex justify-between items-center">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Budget Range</h2>
<span class="font-numeric-data text-numeric-data text-on-surface">$500 - $3,500</span>
</div>
<div class="pt-sm pb-md px-sm relative h-[44px] flex items-center">
<!-- Visual representation of range slider -->
<div class="w-full h-1 bg-custom-border rounded-sm relative">
<div class="absolute h-full bg-primary-container top-0 rounded-sm" style="left: 10%; right: 30%;"></div>
<!-- Thumbs -->
<div class="absolute w-[24px] h-[24px] bg-surface-container-lowest border-2 border-primary-container rounded-full top-1/2 -translate-y-1/2 -translate-x-1/2 shadow-sm cursor-pointer" style="left: 10%;"></div>
<div class="absolute w-[24px] h-[24px] bg-surface-container-lowest border-2 border-primary-container rounded-full top-1/2 -translate-y-1/2 translate-x-1/2 shadow-sm cursor-pointer" style="right: 30%;"></div>
</div>
</div>
</section>
<!-- Divider -->
<div class="h-px bg-custom-border w-full"></div>
<!-- Section 3: Trip Dates -->
<section class="space-y-md">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Trip Dates</h2>
<div class="flex gap-md">
<div class="flex-1 relative">
<label class="sr-only">Start Date</label>
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">calendar_today</span>
</div>
<input class="w-full h-[44px] pl-[36px] pr-sm border border-custom-border rounded bg-surface-container-lowest text-on-surface font-numeric-data text-numeric-data focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container" readonly="" type="text" value="Oct 12, 2023"/>
</div>
<div class="flex-1 relative">
<label class="sr-only">End Date</label>
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">calendar_today</span>
</div>
<input class="w-full h-[44px] pl-[36px] pr-sm border border-custom-border rounded bg-surface-container-lowest text-on-surface font-numeric-data text-numeric-data focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container" readonly="" type="text" value="Oct 19, 2023"/>
</div>
</div>
</section>
<!-- Divider -->
<div class="h-px bg-custom-border w-full"></div>
<!-- Section 4: Duration -->
<section class="space-y-md">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Duration</h2>
<div class="flex border border-custom-border rounded p-[2px] bg-surface-container-low">
<button class="flex-1 h-[40px] flex items-center justify-center font-body-md text-body-md text-on-surface-variant rounded-sm hover:bg-surface-container-highest transition-colors">
                        Weekend
                    </button>
<button class="flex-1 h-[40px] flex items-center justify-center font-body-md text-body-md text-on-surface bg-surface-container-lowest shadow-[0_1px_2px_rgba(0,0,0,0.05)] rounded-sm border border-custom-border/50">
                        3-5 Days
                    </button>
<button class="flex-1 h-[40px] flex items-center justify-center font-body-md text-body-md text-on-surface-variant rounded-sm hover:bg-surface-container-highest transition-colors">
                        1 Week
                    </button>
<button class="flex-1 h-[40px] flex items-center justify-center font-body-md text-body-md text-on-surface-variant rounded-sm hover:bg-surface-container-highest transition-colors">
                        2+ Weeks
                    </button>
</div>
</section>
<!-- Divider -->
<div class="h-px bg-custom-border w-full"></div>
<!-- Section 5: Travelers -->
<section class="space-y-md">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Travelers</h2>
<div class="space-y-sm">
<!-- Adults Row -->
<div class="flex items-center justify-between h-[44px]">
<span class="font-body-md text-body-md text-on-surface">Adults</span>
<div class="flex items-center gap-md">
<button aria-label="Decrease adults" class="w-[44px] h-[44px] border border-custom-border rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors disabled:opacity-50">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<span class="w-[24px] text-center font-numeric-data text-numeric-data text-on-surface">2</span>
<button aria-label="Increase adults" class="w-[44px] h-[44px] border border-custom-border rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
<!-- Children Row -->
<div class="flex items-center justify-between h-[44px]">
<span class="font-body-md text-body-md text-on-surface">Children</span>
<div class="flex items-center gap-md">
<button aria-label="Decrease children" class="w-[44px] h-[44px] border border-custom-border rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors disabled:opacity-50" disabled="">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<span class="w-[24px] text-center font-numeric-data text-numeric-data text-on-surface">0</span>
<button aria-label="Increase children" class="w-[44px] h-[44px] border border-custom-border rounded flex items-center justify-center text-on-surface-variant hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
</div>
</section>
<!-- Divider -->
<div class="h-px bg-custom-border w-full"></div>
<!-- Section 6: Rating -->
<section class="space-y-md">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Rating</h2>
<div class="flex gap-sm">
<button class="h-[44px] flex-1 border border-primary bg-primary/10 rounded flex items-center justify-center font-numeric-data text-numeric-data text-primary">
                        4.5+
                    </button>
<button class="h-[44px] flex-1 border border-custom-border rounded flex items-center justify-center font-numeric-data text-numeric-data text-on-surface bg-surface-container-lowest hover:bg-surface-container transition-colors">
                        4.0+
                    </button>
<button class="h-[44px] flex-1 border border-custom-border rounded flex items-center justify-center font-body-md text-body-md text-on-surface bg-surface-container-lowest hover:bg-surface-container transition-colors">
                        Any
                    </button>
</div>
</section>
<!-- Divider -->
<div class="h-px bg-custom-border w-full"></div>
<!-- Section 7: Amenities -->
<section class="space-y-md">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Amenities</h2>
<div class="space-y-xs">
<!-- Checkbox item -->
<label class="flex items-center h-[44px] cursor-pointer group">
<div class="relative flex items-center">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-[20px] h-[20px] border border-primary bg-primary-container rounded-sm flex items-center justify-center mr-md">
<span class="material-symbols-outlined text-[16px] text-on-primary">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-on-surface">Walkable</span>
</label>
<label class="flex items-center h-[44px] cursor-pointer group">
<div class="relative flex items-center">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-[20px] h-[20px] border border-primary bg-primary-container rounded-sm flex items-center justify-center mr-md">
<span class="material-symbols-outlined text-[16px] text-on-primary">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-on-surface">Food &amp; Dining</span>
</label>
<label class="flex items-center h-[44px] cursor-pointer group">
<div class="relative flex items-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-[20px] h-[20px] border border-custom-border rounded-sm flex items-center justify-center mr-md bg-surface-container-lowest group-hover:border-primary-container transition-colors">
<span class="material-symbols-outlined text-[16px] text-transparent">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-on-surface">Museums</span>
</label>
<label class="flex items-center h-[44px] cursor-pointer group">
<div class="relative flex items-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-[20px] h-[20px] border border-custom-border rounded-sm flex items-center justify-center mr-md bg-surface-container-lowest group-hover:border-primary-container transition-colors">
<span class="material-symbols-outlined text-[16px] text-transparent">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-on-surface">Nightlife</span>
</label>
<label class="flex items-center h-[44px] cursor-pointer group">
<div class="relative flex items-center">
<input checked="" class="peer sr-only" type="checkbox"/>
<div class="w-[20px] h-[20px] border border-primary bg-primary-container rounded-sm flex items-center justify-center mr-md">
<span class="material-symbols-outlined text-[16px] text-on-primary">check</span>
</div>
</div>
<span class="font-body-md text-body-md text-on-surface">Public Transit</span>
</label>
</div>
</section>
</div>
<!-- Sticky Footer -->
<div class="fixed bottom-0 left-0 right-0 p-md bg-surface-container-lowest border-t border-custom-border z-10">
<div class="flex gap-md max-w-3xl mx-auto">
<button class="h-[48px] px-lg border border-custom-border rounded flex items-center justify-center font-label-caps text-label-caps text-[#09090b] bg-surface-container-lowest hover:bg-surface-container transition-colors min-w-[100px]">
                    RESET
                </button>
<button class="h-[48px] flex-1 bg-primary-container text-on-primary rounded flex items-center justify-center font-label-caps text-label-caps hover:bg-primary-container/90 transition-colors">
                    SHOW 48 RESULTS
                </button>
</div>
</div>
</div>
</body></html>
