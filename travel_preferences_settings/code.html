<body class="bg-surface text-on-surface antialiased w-[390px] mx-auto relative min-h-[844px] pb-24 overflow-x-hidden">

            Travel Preferences

</header>
<main class="px-container-margin pt-lg flex flex-col gap-xl">
<!-- 1. Budget Preference -->
<section>
<h2 class="font-title-sm text-title-sm text-on-surface mb-md">Budget Preference</h2>
<div class="flex flex-col gap-sm">
<!-- Economy -->
<label class="block cursor-pointer">
<input class="peer sr-only" name="budget" type="radio" value="economy">
<div class="border border-outline-variant rounded-lg p-md bg-surface-container-lowest flex items-center justify-between peer-checked:border-[2px] peer-checked:border-primary-container peer-checked:bg-primary-container/5 transition-all">
<div>
<div class="font-title-sm text-[15px] leading-tight text-on-surface font-semibold mb-xs">Economy</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Budget-conscious, essential comfort</div>
</div>
<div class="font-numeric-data text-numeric-data text-on-surface-variant peer-checked:text-primary-container font-medium">$</div>
</div>
</label>
<!-- Standard (Active) -->
<label class="block cursor-pointer">
<input checked="" class="peer sr-only" name="budget" type="radio" value="standard">
<div class="border border-outline-variant rounded-lg p-md bg-surface-container-lowest flex items-center justify-between peer-checked:border-[2px] peer-checked:border-primary-container peer-checked:bg-primary-container/5 transition-all">
<div>
<div class="font-title-sm text-[15px] leading-tight text-on-surface font-semibold mb-xs">Standard</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Balanced cost and convenience</div>
</div>
<div class="font-numeric-data text-numeric-data text-primary-container font-medium">$$</div>
</div>
</label>
<!-- Premium -->
<label class="block cursor-pointer">
<input class="peer sr-only" name="budget" type="radio" value="premium">
<div class="border border-outline-variant rounded-lg p-md bg-surface-container-lowest flex items-center justify-between peer-checked:border-[2px] peer-checked:border-primary-container peer-checked:bg-primary-container/5 transition-all">
<div>
<div class="font-title-sm text-[15px] leading-tight text-on-surface font-semibold mb-xs">Premium</div>
<div class="font-body-sm text-body-sm text-on-surface-variant">Luxury, high-end experiences</div>
</div>
<div class="font-numeric-data text-numeric-data text-on-surface-variant peer-checked:text-primary-container font-medium">$$$</div>
</div>
</label>
</div>
</section>
<!-- 4. Travel Pace (Segmented Control - Moved up for logical flow) -->

<h2 class="font-title-sm text-title-sm text-on-surface mb-md">Travel Pace</h2>
<div class="flex w-full border border-outline-variant rounded-lg bg-surface-container-lowest p-[2px]">
<button class="flex-1 py-sm text-center font-label-caps text-label-caps rounded-[3px] text-on-surface-variant hover:bg-surface-container-low uppercase tracking-widest transition-colors">Relaxed</button>
<button class="flex-1 py-sm text-center font-label-caps text-label-caps rounded-[3px] segmented-active shadow-[0_1px_2px_rgba(0,0,0,0.05)] uppercase tracking-widest transition-colors">Balanced</button>
<button class="flex-1 py-sm text-center font-label-caps text-label-caps rounded-[3px] text-on-surface-variant hover:bg-surface-container-low uppercase tracking-widest transition-colors">Packed</button>
</div>
</section>
<!-- 2. Dietary Restrictions -->
<section>

<input checked="" class="utility-checkbox sr-only" type="checkbox">
<div class="w-5 h-5 border border-outline-variant rounded-[3px] flex items-center justify-center transition-colors">

</div>
</div>
</label>
<label class="flex items-center justify-between p-md cursor-pointer hover:bg-surface-container-low transition-colors">

<div class="w-5 h-5 border border-outline-variant rounded-[3px] flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-[16px] text-on-primary opacity-0 transition-opacity">check</span>
</div>
</div>
</label>
<label class="flex items-center justify-between p-md cursor-pointer hover:bg-surface-container-low transition-colors">

</div>

</div>

<label class="block cursor-pointer">

<span class="material-symbols-outlined text-on-surface-variant peer-checked:text-primary-container text-[20px]">directions_car</span>

</div>

</section>
<!-- 6. Localization -->
<section class="pb-md">
<h2 class="font-title-sm text-title-sm text-on-surface mb-md">Localization</h2>
<div class="border border-outline-variant rounded-lg bg-surface-container-lowest divide-y divide-surface-variant overflow-hidden">

        <span class="material-symbols-outlined text-[24px]">search</span>

    </button>
    <button class="flex flex-col items-center justify-center flex-1 gap-1 py-1 text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-[24px]">calendar_today</span>
        <span class="font-label-caps text-[10px] uppercase tracking-tighter">Itinerary</span>
    </button>
    <button class="flex flex-col items-center justify-center flex-1 gap-1 py-1 text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-[24px]">map</span>
        <span class="font-label-caps text-[10px] uppercase tracking-tighter">Map</span>
    </button>
    <button class="flex flex-col items-center justify-center flex-1 gap-1 py-1 text-primary transition-colors">
        <span class="material-symbols-outlined text-[24px] filled">person</span>
        <span class="font-label-caps text-[10px] uppercase tracking-tighter font-bold">Profile</span>
    </button>
</nav>
<script>
        // Simple script to handle segmented control visual swap
        document.addEventListener('DOMContentLoaded', () => {
            const segmentedButtons = document.querySelectorAll('.segmented-active').parentElement.querySelectorAll('button');
            segmentedButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    segmentedButtons.forEach(b => {
                        b.classList.remove('segmented-active', 'shadow-[0_1px_2px_rgba(0,0,0,0.05)]');
                        b.classList.add('text-on-surface-variant', 'hover:bg-surface-container-low');
                    });
                    e.target.classList.add('segmented-active', 'shadow-[0_1px_2px_rgba(0,0,0,0.05)]');
                    e.target.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-low');
                });
            });
        });
    </script>
